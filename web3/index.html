<!DOCTYPE html>
<html lang="zh" x-data="calculator()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数字加密解密器</title>
    <link href="./resources/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./resources/css/styles.css">
    <script src="./resources/js/bootstrap.bundle.min.js"></script>
    <script src="./resources/js/alpine.min.js" defer></script>
    <script src="./resources/js/script.js" ></script>
</head>
<body>
<!-- 背景浅蓝渐变 -->
<div class="bg-gradient-primary d-flex align-items-center justify-content-center">
    <div class="container">
        <!-- 页面标题 -->
        <h1 class="text-center text-white mb-5 display-4">数字加密解密器</h1>

        <!-- 卡片式布局 -->
        <div class="card shadow-lg p-4 rounded-4">
            <div class="card-body">
                <!-- 表格 -->
                <table class="table table-bordered table-hover">
                    <thead class="table-primary">
                    <tr>
                        <th>类型</th>
                        <th>值</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>原始数字</td>
                        <td class="copyable" @click="copyToClipboard(originalNumber)" x-text="originalNumber"></td>
                    </tr>
                    <tr>
                        <td>逐位加密结果</td>
                        <td class="copyable" @click="copyToClipboard(digitEncrypted)" x-text="digitEncrypted"></td>
                    </tr>
                    <tr>
                        <td>整体加密结果</td>
                        <td class="copyable" @click="copyToClipboard(globalEncrypted)" x-text="globalEncrypted"></td>
                    </tr>
                    <tr>
                        <td>最终加密结果</td>
                        <td class="copyable" @click="copyToClipboard(finalResult)" x-text="finalResult"></td>
                    </tr>
                    <tr>
                        <td>解密验证</td>
                        <td class="copyable" @click="copyToClipboard(decryptedResult)" x-text="decryptedResult"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 输入部分 -->
        <div class="card mt-4 shadow-lg p-4 rounded-4">
            <div class="card-body">
                <div class="input-section row g-3">
                    <div class="col-12 col-md-6">
                        <label for="number" class="form-label">输入数字:</label>
                        <input type="text" id="number" class="form-control form-control-lg" x-model="inputNumber" @keyup.enter="processNumber()" placeholder="请输入要解密的数字" required>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="digitKey" class="form-label">逐位密钥:</label>
                        <input type="number" id="digitKey" class="form-control form-control-lg" x-model.number="digitKey" placeholder="默认为7" min="0" max="9">
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="globalKey" class="form-label">整体密钥:</label>
                        <input type="number" id="globalKey" class="form-control form-control-lg" x-model.number="globalKey" placeholder="默认为12345">
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="operation" class="form-label">操作类型:</label>
                        <select id="operation" class="form-select form-select-lg" x-model="operation">
                            <option value="decrypt">解密</option>
                            <option value="encrypt">加密</option>
                        </select>
                    </div>
                    <div class="col-12 mt-4 text-center">
                        <button @click="processNumber()" class="btn btn-lg btn-gradient-primary px-4 py-2 text-white" aria-label="处理">
                            <span x-text="operation === 'encrypt' ? '加密' : '解密'"></span>
                        </button>
                        <button @click="clear()" class="btn btn-lg btn-outline-secondary px-4 py-2 ms-2" aria-label="清除">清除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div x-show="loading" class="loading-overlay">
    <div class="spinner"></div> <!-- 加载动画 -->
</div>
</body>

</html>
