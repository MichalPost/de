name: Build iOS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build mobile web assets
        run: pnpm build:mobile

      - name: Add iOS platform if not present
        if: ${{ !hashFiles('apps/mobile/ios/App/App.xcodeproj/project.pbxproj') }}
        run: |
          npx cap add ios
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/ios/
          git commit -m "ci: init iOS platform [skip ci]"
          git push
        working-directory: apps/mobile

      - name: Sync Capacitor to iOS
        run: npx cap sync ios
        working-directory: apps/mobile

      - name: Build for simulator (unsigned)
        run: |
          xcodebuild \
            -project apps/mobile/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath apps/mobile/ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: apps/mobile/ios/build/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 7
