name: 构建并发布全平台

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      desktop_version: ${{ steps.version.outputs.desktop_version }}
      tag: ${{ steps.version.outputs.tag }}
      release_id: ${{ steps.create_release.outputs.id }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 生成版本号
        id: version
        run: |
          RELEASE_MONTH_DAY=$(date +'%Y.%-m%d')
          DESKTOP_YEAR=$(date +'%y')
          DESKTOP_MONTH=$(date +'%-m')
          RELEASE_VERSION="${RELEASE_MONTH_DAY}.${GITHUB_RUN_NUMBER}"
          DESKTOP_VERSION="${DESKTOP_YEAR}.${DESKTOP_MONTH}.${GITHUB_RUN_NUMBER}"
          TAG="v${RELEASE_VERSION}"
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "desktop_version=$DESKTOP_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 创建 Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Skip if tag already exists (e.g. re-run on same day)
          git tag ${{ steps.version.outputs.tag }} 2>/dev/null || echo "Tag already exists, skipping"
          git push origin ${{ steps.version.outputs.tag }} 2>/dev/null || echo "Tag already on remote, skipping"

      - name: 创建 GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ChemTools ${{ steps.version.outputs.tag }}
          body: |
            自动构建版本 ${{ steps.version.outputs.tag }}
            提交：${{ github.sha }}
          draft: false
          prerelease: false

  build_desktop:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-name: linux-deb
            artifact-path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          - platform: windows-latest
            artifact-name: windows-installer
            artifact-path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          - platform: macos-latest
            artifact-name: macos-dmg
            artifact-path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: 注入版本号
        shell: bash
        run: |
          DESKTOP_VERSION="${{ needs.prepare.outputs.desktop_version }}"
          echo "VERSION=$DESKTOP_VERSION" >> $GITHUB_ENV
          VERSION="$DESKTOP_VERSION" node -e "
            const fs = require('fs');
            const v = process.env.VERSION;
            const conf = 'apps/desktop/src-tauri/tauri.conf.json';
            fs.writeFileSync(conf, fs.readFileSync(conf,'utf8').replace(/\"version\": \"[^\"]*\"/, '\"version\": \"' + v + '\"'));
            const cargo = 'apps/desktop/src-tauri/Cargo.toml';
            fs.writeFileSync(cargo, fs.readFileSync(cargo,'utf8').replace(/^version = \"[^\"]*\"/m, 'version = \"' + v + '\"'));
          "

      - name: 构建 Web 资源
        run: pnpm build:web

      - name: 生成 Tauri 图标
        shell: bash
        run: |
          cd apps/desktop
          test -f ../../assets/brand/public/favicon.svg
          pnpm tauri icon ../../assets/brand/public/favicon.svg

      - name: 构建 Tauri 应用并上传到 Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: ChemTools ${{ needs.prepare.outputs.tag }}
          releaseId: ${{ needs.prepare.outputs.release_id }}
          includeUpdaterJson: ${{ matrix.platform == 'windows-latest' }}
          updaterJsonPreferNsis: ${{ matrix.platform == 'windows-latest' }}

  build_android:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 运行单元测试
        run: pnpm --filter @chemtools/shared test

      - name: 配置 Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v4

      - name: 注入版本号
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="${{ needs.prepare.outputs.release_version }}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" apps/mobile/android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" apps/mobile/android/app/build.gradle

      - name: 构建移动端 Web 资源
        run: pnpm build:mobile
        env:
          VERSION: ${{ env.VERSION_NAME }}

      - name: 同步 Capacitor 到 Android
        run: pnpm cap:sync
        working-directory: apps/mobile

      - name: 写入 Android 签名文件
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/mobile/android/release.keystore
          cat > apps/mobile/android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: 授予 Gradle 执行权限
        run: chmod +x gradlew
        working-directory: apps/mobile/android

      - name: 构建发布 APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: apps/mobile/android

      - name: 重命名 APK（含版本号）
        run: |
          mv apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
             apps/mobile/android/app/build/outputs/apk/release/chemtools-android-${{ env.VERSION_NAME }}.apk

      - name: 生成 Android 更新清单
        shell: bash
        run: |
          cat > apps/mobile/android/app/build/outputs/apk/release/latest-mobile.json <<EOF
          {
            "version": "${{ env.VERSION_NAME }}",
            "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare.outputs.tag }}/chemtools-android-${{ env.VERSION_NAME }}.apk",
            "releaseUrl": "https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.tag }}",
            "publishedAt": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF

      - name: 上传 Android 到同一个 Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ChemTools ${{ needs.prepare.outputs.tag }}
          files: |
            apps/mobile/android/app/build/outputs/apk/release/chemtools-android-${{ env.VERSION_NAME }}.apk
            apps/mobile/android/app/build/outputs/apk/release/latest-mobile.json
          fail_on_unmatched_files: true

  build_ios:
    needs: prepare
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 注入版本号
        run: echo "VERSION=${{ needs.prepare.outputs.release_version }}" >> $GITHUB_ENV

      - name: 构建移动端 Web 资源
        run: pnpm build:mobile
        env:
          VERSION: ${{ env.VERSION }}

      - name: 添加 iOS 平台（如不存在）
        if: ${{ !hashFiles('apps/mobile/ios/App/App.xcodeproj/project.pbxproj') }}
        run: |
          npx cap add ios
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/ios/
          git commit -m "ci: init iOS platform [skip ci]"
          git push
        working-directory: apps/mobile

      - name: 同步 Capacitor 到 iOS
        run: npx cap sync ios
        working-directory: apps/mobile

      - name: 构建模拟器版本（未签名）
        run: |
          xcodebuild \
            -project apps/mobile/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath apps/mobile/ios/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: 打包模拟器产物为 zip
        run: |
          cd apps/mobile/ios/build/Build/Products/Debug-iphonesimulator
          zip -r chemtools-ios-simulator-${{ env.VERSION }}.zip App.app

      - name: 上传 iOS 到同一个 Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ChemTools ${{ needs.prepare.outputs.tag }}
          files: apps/mobile/ios/build/Build/Products/Debug-iphonesimulator/chemtools-ios-simulator-${{ env.VERSION }}.zip
          fail_on_unmatched_files: true

  verify_update_feeds:
    needs: [prepare, build_desktop, build_android]
    runs-on: ubuntu-latest

    steps:
      - name: 验证桌面端 latest.json
        run: |
          set -euo pipefail
          DESKTOP_VERSION="${{ needs.prepare.outputs.desktop_version }}"
          URL="https://github.com/${{ github.repository }}/releases/latest/download/latest.json"
          echo "Checking $URL"
          for i in 1 2 3 4 5; do
            if curl -fL --retry 3 --retry-delay 2 "$URL" -o latest.json; then
              break
            fi
            echo "Retry $i failed, waiting..."
            sleep 5
          done
          test -f latest.json
          grep -F "$DESKTOP_VERSION" latest.json

      - name: 验证移动端 latest-mobile.json
        run: |
          set -euo pipefail
          MOBILE_VERSION="${{ needs.prepare.outputs.release_version }}"
          URL="https://github.com/${{ github.repository }}/releases/latest/download/latest-mobile.json"
          echo "Checking $URL"
          for i in 1 2 3 4 5; do
            if curl -fL --retry 3 --retry-delay 2 "$URL" -o latest-mobile.json; then
              break
            fi
            echo "Retry $i failed, waiting..."
            sleep 5
          done
          test -f latest-mobile.json
          grep -F "\"version\": \"$MOBILE_VERSION\"" latest-mobile.json

  summary:
    needs: [prepare, build_desktop, build_android, build_ios, verify_update_feeds]
    runs-on: ubuntu-latest
    if: ${{ always() }}

    steps:
      - name: 输出发布摘要
        run: |
          {
            echo "## Release 已生成"
            echo
            echo "- Tag: \`${{ needs.prepare.outputs.tag }}\`"
            echo "- Release: https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.tag }}"
            echo
            echo "包含产物："
            echo "- 桌面端: Windows / macOS / Linux"
            echo "- 手机端: Android APK"
            echo "- iOS 模拟器 ZIP: ${{ needs.build_ios.result == 'success' && '已上传' || '构建失败，未阻塞发布' }}"
            echo "- 更新清单验证: ${{ needs.verify_update_feeds.result == 'success' && 'latest.json / latest-mobile.json 可访问' || '验证失败，请检查 Release 资产' }}"
          } >> $GITHUB_STEP_SUMMARY
