name: 构建 Tauri 桌面端

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-name: linux-deb
            artifact-path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          - platform: windows-latest
            artifact-name: windows-installer
            artifact-path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          - platform: macos-latest
            artifact-name: macos-dmg
            artifact-path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 配置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 缓存 pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
            ~\AppData\Local\pnpm\store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: 安装依赖
        run: pnpm install

      - name: 构建 Web 资源
        run: pnpm build:web

      - name: 生成 Tauri 图标
        run: pnpm tauri icon apps/web/public/hero.png
        working-directory: apps/desktop

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: -- --no-before-build-command

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 7
