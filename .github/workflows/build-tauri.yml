name: 构建 Tauri 桌面端

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 第一步：生成版本号、打 tag、创建 Release ──────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 生成版本号
        id: version
        run: |
          MONTH=$(date +'%-m' 2>/dev/null || date +'%m' | sed 's/^0//')
          DAY=$(date +'%-d' 2>/dev/null || date +'%d' | sed 's/^0//')
          YEAR=$(date +'%y')
          VERSION="${YEAR}.${MONTH}.${DAY}"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: 创建 Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Skip if tag already exists (e.g. re-run on same day)
          git tag ${{ steps.version.outputs.tag }} 2>/dev/null || echo "Tag already exists, skipping"
          git push origin ${{ steps.version.outputs.tag }} 2>/dev/null || echo "Tag already on remote, skipping"

      - name: 创建 GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ChemTools ${{ steps.version.outputs.tag }}
          body: |
            自动构建版本 ${{ steps.version.outputs.tag }}
            提交：${{ github.sha }}
          draft: false
          prerelease: false

  # ── 第二步：三平台并行构建，上传到同一个 Release ─────────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-name: linux-deb
            artifact-path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          - platform: windows-latest
            artifact-name: windows-installer
            artifact-path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          - platform: macos-latest
            artifact-name: macos-dmg
            artifact-path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: 注入版本号
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          VERSION="$VERSION" node -e "
            const fs = require('fs');
            const v = process.env.VERSION;
            const conf = 'apps/desktop/src-tauri/tauri.conf.json';
            fs.writeFileSync(conf, fs.readFileSync(conf,'utf8').replace(/\"version\": \"[^\"]*\"/, '\"version\": \"' + v + '\"'));
            const cargo = 'apps/desktop/src-tauri/Cargo.toml';
            fs.writeFileSync(cargo, fs.readFileSync(cargo,'utf8').replace(/^version = \"[^\"]*\"/m, 'version = \"' + v + '\"'));
          "

      - name: 构建 Web 资源
        run: pnpm build:web

      - name: 生成 Tauri 图标
        shell: bash
        run: |
          cd apps/desktop
          test -f ../../assets/brand/public/favicon.svg
          pnpm tauri icon ../../assets/brand/public/favicon.svg

      - name: 构建 Tauri 应用并上传到 Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: --no-before-build-command
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: ChemTools ${{ needs.prepare.outputs.tag }}
          releaseId: ${{ needs.prepare.outputs.release_id }}
