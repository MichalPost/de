name: 构建 Tauri 桌面端

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-name: linux-deb
            artifact-path: apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          - platform: windows-latest
            artifact-name: windows-installer
            artifact-path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          - platform: macos-latest
            artifact-name: macos-dmg
            artifact-path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: 注入版本号
        shell: bash
        run: |
          MONTH=$(date +'%-m' 2>/dev/null || date +'%m' | sed 's/^0//')
          DAY=$(date +'%-d' 2>/dev/null || date +'%d' | sed 's/^0//')
          YEAR=$(date +'%y')
          VERSION="${YEAR}.${MONTH}.${DAY}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          VERSION="$VERSION" node -e "
            const fs = require('fs');
            const v = process.env.VERSION;
            const conf = 'apps/desktop/src-tauri/tauri.conf.json';
            fs.writeFileSync(conf, fs.readFileSync(conf,'utf8').replace(/\"version\": \"[^\"]*\"/, '\"version\": \"' + v + '\"'));
            const cargo = 'apps/desktop/src-tauri/Cargo.toml';
            fs.writeFileSync(cargo, fs.readFileSync(cargo,'utf8').replace(/^version = \"[^\"]*\"/m, 'version = \"' + v + '\"'));
          "

      - name: 构建 Web 资源
        run: pnpm build:web

      - name: 生成 Tauri 图标
        shell: bash
        run: |
          cd apps/desktop
          test -f ../../assets/brand/public/favicon.svg
          pnpm tauri icon ../../assets/brand/public/favicon.svg

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ env.VERSION }}
          path: ${{ matrix.artifact-path }}
          retention-days: 7
