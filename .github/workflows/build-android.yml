name: 构建 Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 运行单元测试
        run: pnpm --filter @chemtools/shared test

      - name: 配置 Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v4

      - name: 注入版本号
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="$(date +'%Y.%-m%d').${{ github.run_number }}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "TAG=v${VERSION_NAME}" >> $GITHUB_ENV
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" apps/mobile/android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" apps/mobile/android/app/build.gradle

      - name: 构建移动端 Web 资源
        run: pnpm build:mobile
        env:
          VERSION: ${{ env.VERSION_NAME }}

      - name: 同步 Capacitor 到 Android
        run: pnpm cap:sync
        working-directory: apps/mobile

      - name: 授予 Gradle 执行权限
        run: chmod +x gradlew
        working-directory: apps/mobile/android

      - name: 构建调试 APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: apps/mobile/android

      - name: 重命名 APK（含版本号）
        run: |
          mv apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk \
             apps/mobile/android/app/build/outputs/apk/debug/chemtools-${{ env.VERSION_NAME }}.apk

      - name: 创建 Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ env.TAG }}
          git push origin ${{ env.TAG }}

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ChemTools Android ${{ env.TAG }}
          body: |
            自动构建版本 ${{ env.TAG }}
            提交：${{ github.sha }}
          files: apps/mobile/android/app/build/outputs/apk/debug/chemtools-${{ env.VERSION_NAME }}.apk
          draft: false
          prerelease: false
