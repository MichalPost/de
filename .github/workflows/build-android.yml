name: 构建 Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 配置 Node.js & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 运行单元测试
        run: pnpm --filter @chemtools/shared test

      - name: 配置 Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v4

      - name: 注入版本号
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="$(date +'%Y.%-m%d').${{ github.run_number }}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" apps/mobile/android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" apps/mobile/android/app/build.gradle

      - name: 构建移动端 Web 资源
        run: pnpm build:mobile

      - name: 同步 Capacitor 到 Android
        run: pnpm cap:sync
        working-directory: apps/mobile

      - name: 授予 Gradle 执行权限
        run: chmod +x gradlew
        working-directory: apps/mobile/android

      - name: 构建调试 APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: apps/mobile/android

      - name: 上传 APK
        uses: actions/upload-artifact@v6
        with:
          name: app-${{ env.VERSION_NAME }}
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
