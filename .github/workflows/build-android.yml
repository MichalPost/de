name: 构建 Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 配置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 配置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: pnpm install

      - name: 注入版本号
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="$(date +'%Y.%-m%d').${{ github.run_number }}"
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" apps/mobile/android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" apps/mobile/android/app/build.gradle

      - name: 构建移动端 Web 资源
        run: pnpm build:mobile

      - name: 同步 Capacitor 到 Android
        run: pnpm cap:sync
        working-directory: apps/mobile

      - name: 授予 Gradle 执行权限
        run: chmod +x gradlew
        working-directory: apps/mobile/android

      - name: 构建调试 APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: apps/mobile/android

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
