name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # monorepo: install from root so workspace packages resolve correctly
      - name: Install dependencies
        run: pnpm install

      - name: Build mobile web assets
        run: pnpm build:mobile

      - name: Sync Capacitor to Android
        run: pnpm cap:sync
        working-directory: apps/mobile

      - name: Grant Gradle execute permission
        run: chmod +x gradlew
        working-directory: apps/mobile/android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: apps/mobile/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
