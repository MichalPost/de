<!DOCTYPE html>
<html lang="zh" x-data="calculator()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>进制位移计算器</title>
    <link href="./resources/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./resources/css/styles.css">
    <script src="./resources/js/bootstrap.bundle.min.js"></script>
    <script src="./resources/js/alpine.min.js" defer></script>
    <script src="./resources/js/script.js" ></script>
</head>
<body>
<!-- 背景浅蓝渐变 -->
<div class="bg-gradient-primary d-flex align-items-center justify-content-center">
    <div class="container">
        <!-- 页面标题 -->
        <h1 class="text-center text-white mb-5 display-4">进制位移计算器</h1>

        <!-- 卡片式布局 -->
        <div class="card shadow-lg p-4 rounded-4">
            <div class="card-body">
                <!-- 表格 -->
                <table class="table table-bordered table-hover">
                    <thead class="table-primary">
                    <tr>
                        <th>类型</th>
                        <th>值</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>2进制(原数)</td>
                        <td class="copyable" @click="copyToClipboard(binOriginal)" x-text="binOriginal"></td>
                    </tr>
                    <tr>
                        <td>2进制(结果)</td>
                        <td class="copyable" @click="copyToClipboard(binResult)" x-text="binResult"></td>
                    </tr>
                    <tr>
                        <td>16进制(原数)</td>
                        <td class="copyable" @click="copyToClipboard(hexOriginal)" x-text="hexOriginal"></td>
                    </tr>
                    <tr>
                        <td>16进制(结果)</td>
                        <td class="copyable" @click="copyToClipboard(hexResult)" x-text="hexResult"></td>
                    </tr>
                    <tr>
                        <td>10进制(原数)</td>
                        <td class="copyable" @click="copyToClipboard(decOriginal)" x-text="decOriginal"></td>
                    </tr>
                    <tr>
                        <td>10进制(结果)</td>
                        <td class="copyable" @click="copyToClipboard(decResult)" x-text="decResult"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 输入部分 -->
        <div class="card mt-4 shadow-lg p-4 rounded-4">
            <div class="card-body">
                <div class="input-section row g-3">
                    <div class="col-12 col-md-6">
                        <label for="number" class="form-label">原数:</label>
                        <input type="text" id="number" class="form-control form-control-lg" x-model="number" @keyup.enter="calculate()" placeholder="请输入数字" required>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="shift" class="form-label">移位数:</label>
                        <select id="shift" class="form-select form-select-lg" x-model.number="shift">
                            <option value="12">12</option>
                            <option value="10">10</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="base" class="form-label">原数类型:</label>
                        <select id="base" class="form-select form-select-lg" x-model="base" required>
                            <option value="" disabled selected>选择原数类型</option>
                            <option value="10">10进制(dec)</option>
                            <option value="2">2进制(bin)</option>
                            <option value="16">16进制(hex)</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="method" class="form-label">计算方式:</label>
                        <select id="method" class="form-select form-select-lg" x-model="method">
                            <option value=">>">右移(&gt;&gt;)</option>
                            <option value="<<">左移(&lt;&lt;)</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="padding" class="form-label">新位补数:</label>
                        <select id="padding" class="form-select form-select-lg" x-model.number="padding">
                            <option value="0">0</option>
                            <option value="1">1</option>
                        </select>
                    </div>
                    <div class="col-12 mt-4 text-center">
                        <button @click="useInstrument()" class="btn btn-lg btn-info px-4 py-2 ms-2" aria-label="仪器使用">仪器</button>
                        <button @click="useReagent()" class="btn btn-lg btn-success px-4 py-2 ms-2" aria-label="试剂包使用">试剂包</button>
                        <button @click="calculate()" class="btn btn-lg btn-gradient-primary px-4 py-2 text-white" aria-label="计算">计算</button>
                        <button @click="clear()" class="btn btn-lg btn-outline-secondary px-4 py-2 ms-2" aria-label="清除">清除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div x-show="loading" class="loading-overlay">
    <div class="spinner"></div>
</div>
</body>

</html>
